{% endblock %}

<section class="skills-view" aria-label="Skill builder">
  <div class="skills-summary" aria-label="Resumen de build">
    <article class="summary-card summary-card-main">
      <span class="summary-label">Puntos usados</span>
      <strong id="totalSkillPoints">0</strong>
    </article>
    <article class="summary-card">
      <span class="summary-label">Skills seleccionadas</span>
      <strong id="selectedSkillCount">0</strong>
    </article>
  </div>

  <div class="skills-toolbar">
    <label class="search-box" for="skillSearch">
      <span>Buscar</span>
      <input id="skillSearch" type="search" autocomplete="off" placeholder="Skill, categoría o efecto…">
    </label>
    <button class="button-secondary" type="button" id="clearSkills">Limpiar build</button>
  </div>

  <div id="skillCategories" class="skills-categories"></div>
  <p id="skillEmptyState" class="empty-state" hidden>No encontré skills con ese filtro.</p>
</section>

        "excelCell": "C25"
      },
      {
        "id": "skills-legacy-26-artist",
        "name": "Artist",
        "description": "10% Discount on Seeds and Tools",
        "tier": 0,
        "cost": 0,
        "selected": false,
        "inactive": false,
        "sourceRow": 26,
        "icon": "022_Artist.png",
        "sourceIndex": 22,
        "excelCell": "C26"
      },
      {
        "id": "skills-legacy-27-liquidity-provider-x",
        "name": "Liquidity Provider - X",
        "description": "+50% reduction in FLOWER withdrawal fee",
        "tier": 0,
        "cost": 0,
        "selected": false,
        "inactive": true,
        "sourceRow": 27,
        "icon": "024_Liquidity_Provider.png",
        "sourceIndex": 24,
        "excelCell": "C27"
      }
    ],
    "unlockNote": "Requisitos tomados de las fórmulas de la hoja Skills."
  }
];

  const state = { selected: new Set() };
  const categoriesRoot = document.getElementById('skillCategories');
  const totalSkillPoints = document.getElementById('totalSkillPoints');
  const selectedSkillCount = document.getElementById('selectedSkillCount');
  const skillSearch = document.getElementById('skillSearch');
  const clearSkills = document.getElementById('clearSkills');
  const emptyState = document.getElementById('skillEmptyState');


  function persistSkillSelection() {
    if (!window.SFLBuildState) return;
    const selectedSkills = skillCategories
      .flatMap((category) => category.skills.map((skill) => ({ ...skill, category: category.name })))
      .filter((skill) => state.selected.has(skill.id))
      .map((skill) => ({
        id: skill.id,
        name: skill.name,
        category: skill.category,
        tier: skill.tier,
        cost: Number(skill.cost || 0),
        description: skill.description || '',
        inactive: Boolean(skill.inactive),
        icon: skill.icon || ''
      }));
    window.SFLBuildState.setSkills(selectedSkills);
  }

  function restoreSkillSelection() {
    if (!window.SFLBuildState) return;
    window.SFLBuildState.getSkillIds().forEach((id) => state.selected.add(id));
  }

  const tierLabel = (tier) => tier === 0 ? 'Legacy' : `Tier ${tier}`;
  const pointLabel = (cost) => cost === 1 ? '1 pt' : `${cost} pts`;
  const slug = (value) => String(value || '').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

  function selectedPointsByTier(category) {
    const result = { 1: 0, 2: 0, 3: 0 };
    category.skills.forEach((skill) => {
      if (state.selected.has(skill.id) && skill.tier > 0) result[skill.tier] += Number(skill.cost || 0);
    });
    return result;
  }

  function isTierUnlocked(category, tier) {
    if (tier === 0 || tier === 1) return true;
    const requirement = category.unlock?.[String(tier)];
    if (!requirement) return true;
    const points = selectedPointsByTier(category);
    const total = requirement.tiers.reduce((sum, tierKey) => sum + (points[tierKey] || 0), 0);
    return total >= requirement.points;
  }

  function enforceUnlocks() {
    let changed = false;
    skillCategories.forEach((category) => {
      category.skills.forEach((skill) => {
        if (skill.tier > 1 && state.selected.has(skill.id) && !isTierUnlocked(category, skill.tier)) {
          state.selected.delete(skill.id);
          changed = true;
        }
      });
    });
    return changed;
  }

  function requirementText(category, tier) {
    const requirement = category.unlock?.[String(tier)];
    if (!requirement || tier <= 1) return '';
    const tiers = requirement.tiers.map((item) => `T${item}`).join(' + ');
    return `${requirement.points} pts en ${tiers}`;
  }

  function skillMatches(skill, categoryName, term) {
    if (!term) return true;
    return [skill.name, skill.description, categoryName, tierLabel(skill.tier)]
      .join(' ')
      .toLowerCase()
      .includes(term);
  }

  function renderSkillCard(skill, category, locked, term) {
    const checked = state.selected.has(skill.id);
    const isLegacy = skill.tier === 0;
    const description = skill.description || 'Sin descripción';
    const cost = isLegacy ? 'Legacy' : pointLabel(skill.cost);
    const hidden = !skillMatches(skill, category.name, term);
    return `
      <label class="skill-card ${checked ? 'is-selected' : ''} ${locked ? 'is-locked' : ''} ${hidden ? 'is-hidden' : ''}" data-category="${slug(category.name)}" data-tier="${skill.tier}">
        <input type="checkbox" value="${skill.id}" ${checked ? 'checked' : ''} ${locked ? 'disabled' : ''} aria-label="${skill.name.replace(/"/g, '&quot;')}">
        <img class="skill-icon" src="${SKILL_ICON_BASE}${skill.icon}" alt="" loading="lazy">
        <span class="skill-copy">
          <span class="skill-row">
            <strong class="skill-name">${skill.name}</strong>
            <span class="skill-cost ${isLegacy ? 'is-legacy' : ''}">${cost}</span>
          </span>
          <span class="skill-description">${description}</span>
        </span>
      </label>`;
  }

  function renderTier(category, tier, term) {
    const skills = category.skills.filter((skill) => skill.tier === tier);
    if (!skills.length) return '';
    const locked = !isTierUnlocked(category, tier);
    const req = requirementText(category, tier);
    const cards = skills.map((skill) => renderSkillCard(skill, category, locked && !state.selected.has(skill.id), term)).join('');
    return `
      <section class="tier-column ${locked ? 'is-locked' : ''}">
        <div class="tier-heading">
          <h4>${tierLabel(tier)}</h4>
          ${req ? `<span>${locked ? 'Requiere' : 'Desbloqueado'} · ${req}</span>` : ''}
        </div>
        <div class="skill-list">${cards}</div>
      </section>`;
  }

  function renderCategory(category, term) {
    const isLegacy = category.skills.every((skill) => skill.tier === 0);
    const tiers = [...new Set(category.skills.map((skill) => skill.tier))].sort((a, b) => a - b);
    const selectedNormal = category.skills.filter((skill) => state.selected.has(skill.id) && skill.tier > 0);
    const points = selectedNormal.reduce((sum, skill) => sum + Number(skill.cost || 0), 0);
    const tierMarkup = tiers.map((tier) => renderTier(category, tier, term)).join('');
    return `
      <article class="skill-category ${isLegacy ? 'is-legacy-section' : ''}" data-category="${slug(category.name)}">
        <header class="category-heading">
          <div>
            <h3>${category.name}</h3>
            <p>${isLegacy ? 'Boosts antiguos del farm. No consumen puntos de habilidad.' : 'Skills organizadas por tier.'}</p>
          </div>
          ${isLegacy ? '<span class="category-pill">0 pts</span>' : `<span class="category-pill">${points} pts</span>`}
        </header>
        <div class="tier-grid">${tierMarkup}</div>
      </article>`;
  }

  function render() {
    enforceUnlocks();
    const term = skillSearch.value.trim().toLowerCase();
    categoriesRoot.innerHTML = skillCategories.map((category) => renderCategory(category, term)).join('');

    let visibleCards = 0;
    categoriesRoot.querySelectorAll('.skill-card').forEach((card) => {
      if (!card.classList.contains('is-hidden')) visibleCards += 1;
    });
    emptyState.hidden = visibleCards > 0;

    const selectedBuildSkills = skillCategories
      .flatMap((category) => category.skills)
      .filter((skill) => state.selected.has(skill.id) && skill.tier > 0);
    totalSkillPoints.textContent = selectedBuildSkills.reduce((sum, skill) => sum + Number(skill.cost || 0), 0);
    selectedSkillCount.textContent = selectedBuildSkills.length;
    persistSkillSelection();
  }

  categoriesRoot.addEventListener('change', (event) => {
    const input = event.target.closest('input[type="checkbox"]');
    if (!input) return;
    if (input.checked) state.selected.add(input.value);
    else state.selected.delete(input.value);
    render();
  });

  skillSearch.addEventListener('input', render);
  clearSkills.addEventListener('click', () => {
    state.selected.clear();
    render();
  });

  restoreSkillSelection();
  render();
</script>
{% endblock %}
